  async function decryptTo(pw){
    var base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), {name:"PBKDF2"}, false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:SALT, iterations:ITER, hash:"SHA-256"},
      base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    var buf = await crypto.subtle.decrypt({name:"AES-GCM", iv:IV}, key, CT);
    return new TextDecoder().decode(buf);

  async function tryUnlock(pw, silent){
    var msg = document.getElementById("msg");
    if(!silent){ msg.textContent="Unlocking..."; msg.className=""; }
    try{
      var html = await decryptTo(pw);
      try{ if(document.getElementById("remember").checked) localStorage.setItem("p517k", pw); }catch(e){}
      document.open(); document.write(html); document.close();
    }catch(e){
      if(silent){ try{ localStorage.removeItem("p517k"); }catch(_){}; return; }
      msg.textContent="Wrong password, try again"; msg.className="err";
      var i=document.getElementById("pw"); i.value=""; i.focus();

  }

  document.getElementById("pw").addEventListener("keydown", function(e){ if(e.key==="Enter") tryUnlock(document.getElementById("pw").value, false); });
